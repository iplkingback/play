<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MATCH FIXER</title>

<!-- Preload important images -->
<link rel="preload" as="image" href="bk.webp">
<link rel="preload" as="image" href="vk.webp">

<style>
body{
margin:0;
font-family:sans-serif;
background:#000;
color:#fff;
text-align:center;
overflow-x:hidden;
}

/* Background */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('bk.webp') center/cover no-repeat;
z-index:-1;
filter:brightness(0.5);
}

/* Neon border effect */
.bg::after{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
box-shadow:0 0 20px #00f, 0 0 40px #0ff inset;
animation:neon 2s infinite alternate;
}
@keyframes neon{
from{opacity:0.6;}
to{opacity:1;}
}

/* DP */
.dp{
width:110px;
height:110px;
border-radius:50%;
margin-top:20px;
border:3px solid #fff;
object-fit:cover;
}

/* Title */
h1{
margin:10px 0 5px;
font-size:26px;
}

/* Tagline */
.tagline{
font-size:20px;
opacity:0.8;
margin-bottom:10px;
}

/* Counter */
.counter{
font-size:16px;
margin:10px 0;
}

/* Countdown */
.timer{
color:#ff4444;
font-size:16px;
margin:20px 0;
}

/* TELEGRAM BUTTON */
.telegram-btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:14px 22px;
background:#0088cc;
color:#fff;
text-decoration:none;
border-radius:30px;
font-size:16px;
font-weight:bold;
margin:15px auto;
animation:pulse 1.5s infinite;
}
.telegram-btn img{
width:20px;
}

/* Pulse animation */
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* Text lines */
.info{
font-size:30px;
margin-top:50px;
}
</style>
</head>

<body>

<div class="bg"></div>

<img src="vkp.webp" class="dp" alt="Match Expert">

<h1>MATCH FIXER</h1>
<div class="tagline">india's no. 1 cricket expert</div>

<div class="counter" id="counter">29000 subscribers</div>

<div class="timer" id="timer">Free joining ends in 10 seconds</div>

<!-- ✅ Updated Telegram Button -->
<a href="https://telegram.me/+cdfXSddiMxpmYTdl" id="telegramBtn" class="telegram-btn">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
Join My Telegram
</a>

<div class="info">IPL 2026 All Matches Free Reports</div>
<div class="info">T-20 world cup - 91% matches pass</div>

<script>
// Subscriber animation
let count = 29000;
const target = 29580;
const counter = document.getElementById("counter");

function updateCounter(){
if(count < target){
count += Math.floor(Math.random()*8)+1;
if(count > target) count = target;
counter.innerText = count + " subscribers";
setTimeout(updateCounter, 80);
}
}
updateCounter();

// Countdown timer (optional display only)
let time = 10;
const timer = document.getElementById("timer");

const countdown = setInterval(()=>{
time--;
timer.innerText = "Free joining ends in " + time + " seconds";

if(time <= 0){
clearInterval(countdown);
// removed automatic redirect, user clicks the button manually
}
},1000);
</script>
